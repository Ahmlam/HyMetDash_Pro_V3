name: OGIMET Data Sync

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Manual trigger

jobs:
  sync-ogimet:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas openpyxl

      - name: Run OGIMET sync
        env:
          OGIMET_COUNTRY: ${{ vars.OGIMET_COUNTRY || 'Cote' }}
          OGIMET_WINDOW_HOURS: ${{ vars.OGIMET_WINDOW_HOURS || '6' }}
          OGIMET_WIDEN_HOURS: ${{ vars.OGIMET_WIDEN_HOURS || '12' }}
        run: python ogimet_sync.py

      - name: Commit and push new data
        run: |
          git config --local user.email "hymetdash-bot@sodexam.ci"
          git config --local user.name "HyMetDash OGIMET Bot"
          git add data/ogimet_sync/
          if git diff --staged --quiet; then
            echo "No new OGIMET data to commit."
          else
            git commit -m "🌤️ Auto-sync OGIMET data $(date -u +'%Y-%m-%d %h:%m UTC')"
            git push
          fi
