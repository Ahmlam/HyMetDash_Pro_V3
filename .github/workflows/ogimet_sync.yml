name: OGIMET Data Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync-ogimet:
    runs-on: ubuntu-22.04   # 🔥 plus stable que latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # ✅ corrige Node 20

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'   # ⚡ accélère

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run OGIMET sync
        env:
          OGIMET_COUNTRY: ${{ vars.OGIMET_COUNTRY || 'Cote' }}
          OGIMET_WINDOW_HOURS: ${{ vars.OGIMET_WINDOW_HOURS || '6' }}
          OGIMET_WIDEN_HOURS: ${{ vars.OGIMET_WIDEN_HOURS || '12' }}
        run: |
          echo "Running OGIMET sync..."
          python ogimet_sync.py

      - name: Commit and push new data
        run: |
          git config --global user.email "hymetdash-bot@sodexam.ci"
          git config --global user.name "HyMetDash OGIMET Bot"

          git add data/ogimet_sync/ || true

          if git diff --staged --quiet; then
            echo "No new OGIMET data to commit."
          else
            git commit -m "🌤️ Auto-sync OGIMET data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin HEAD:main
          fi
